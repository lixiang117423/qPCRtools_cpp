name: Build qPCRtools

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  QT_VERSION: '6.5.3'
  QT_MODULES: 'qtwebengine qtwebchannel qtpositioning'

jobs:
  build-windows:
    name: Build Windows (EXE)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        cache: true
        modules: ${{ env.QT_MODULES }}

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install dependencies
      run: |
        C:\vcpkg\vcpkg install eigen3:x64-windows gsl:x64-windows --classic

    - name: Configure CMake
      run: |
        cmake -B build `
          -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
          -DCMAKE_CXX_STANDARD=17

    - name: Build
      run: cmake --build build --config Release

    - name: Deploy Windows
      shell: pwsh
      run: |
        # 使用 windeployqt 收集依赖（Qt6 会自动检测 WebEngine）
        & "$env:Qt6_DIR/bin/windeployqt.exe" build/Release/qPCRtools.exe --release --no-translations

        # 复制 web 资源
        New-Item -ItemType Directory -Force -Path build/Release/web
        Copy-Item -Path web/* -Destination build/Release/web -Recurse -Force

        # 复制示例数据文件
        New-Item -ItemType Directory -Force -Path build/Release/examples
        Copy-Item -Path examples/*.csv -Destination build/Release/examples -Force

        # 创建发布目录
        New-Item -ItemType Directory -Force -Path release
        Copy-Item -Path build/Release/* -Destination release -Recurse -Force

        # 压缩为 ZIP
        Compress-Archive -Path release/* -DestinationPath qPCRtools-windows.zip

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: qPCRtools-windows
        path: qPCRtools-windows.zip
        retention-days: 30
        if-no-files-found: error

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: qPCRtools-windows.zip
        draft: false
        prerelease: false
        generate_release_notes: true
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        cache: true
        modules: ${{ env.QT_MODULES }}

    - name: Install dependencies
      run: |
        brew install eigen gsl ninja

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -GNinja

    - name: Build
      run: |
        cmake --build build
        echo "Build exit code: $?"

    - name: Find app bundle
      run: |
        echo "=== build directory structure ==="
        find build -type f -name "*.app" -o -type d -name "*.app" | head -20
        ls -la build/

    - name: Deploy macOS
      run: |
        # 找到 app 实际位置
        APP_PATH=$(find build -name "qPCRtools.app" -type d | head -1)

        # 检查是否找到 app
        if [ -z "$APP_PATH" ]; then
          echo "❌ ERROR: qPCRtools.app not found!"
          echo "=== All files in build directory ==="
          find build -type f | head -30
          exit 1
        fi

        echo "✅ Found app at: $APP_PATH"

        # 先复制 web 资源（在 macdeployqt 之前）
        mkdir -p "$APP_PATH/Contents/Resources/web"
        cp -R web/* "$APP_PATH/Contents/Resources/web/"

        # 复制示例数据文件
        mkdir -p "$APP_PATH/Contents/Resources/examples"
        cp examples/*.csv "$APP_PATH/Contents/Resources/examples/"

        # 使用 macdeployqt 收集依赖
        $Qt6_DIR/bin/macdeployqt "$APP_PATH" -no-strip

        # 对应用进行临时签名（ad-hoc signing）
        codesign --force --deep --sign - "$APP_PATH"

        # 手动创建 DMG
        mkdir -p dmg_temp
        cp -R "$APP_PATH" dmg_temp/
        ln -s /Applications dmg_temp/Applications

        hdiutil create -volname "qPCRtools" \
          -srcfolder dmg_temp \
          -ov -format UDZO \
          -imagekey zlib-level=9 \
          qPCRtools-macos.dmg

        # 清理
        rm -rf dmg_temp

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: qPCRtools-macos
        path: qPCRtools-macos.dmg
        retention-days: 30
        if-no-files-found: error

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: qPCRtools-macos.dmg
        draft: false
        prerelease: false
        generate_release_notes: true
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
